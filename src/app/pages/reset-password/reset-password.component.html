<app-page-layout [showHeader]="false" [showBackButton]="false" backgroundColor="#ffffff">
  <div class="signin-container">

    <div class="form-section">
      <div class="form-wrapper">
        <div class="form-header">
          <h1 class="signin-title">Forgot Password</h1>
        </div>

        <form class="signin-form">
          <!-- Error Message -->
          @if (errorMessage) {
            <div class="field">
              <p-message severity="error" [text]="errorMessage" styleClass="w-full"></p-message>
            </div>
          }

          <!-- Email Field -->
          <div class="field">
            <label class="field-label">Email Address</label>
            <div class="input-wrapper">
              <i class="pi pi-envelope input-icon"></i>
              <input
                type="email"
                pInputText
                [(ngModel)]="email"
                name="email"
                placeholder="you@example.com"
                class="input-field"
                [disabled]="isLoading"
              />
            </div>
          </div>

          <!-- CAPTCHA Section -->
          <div class="field">
            <label class="field-label">Security Verification</label>
            <div class="captcha-wrapper">
              <div class="captcha-image-container">
                @if (captchaImageUrl && !captchaLoading) {
                  <img
                    [src]="captchaImageUrl"
                    alt="CAPTCHA"
                    class="captcha-image"
                  />
                }
                @if (captchaLoading) {
                  <div class="captcha-loading">
                    <i class="pi pi-spin pi-spinner"></i>
                    <span>Loading...</span>
                  </div>
                }
                <button
                  type="button"
                  class="captcha-refresh"
                  (click)="refreshCaptcha()"
                  [disabled]="captchaLoading || isLoading"
                  title="Refresh CAPTCHA"
                >
                  <i class="pi pi-refresh"></i>
                </button>
              </div>
              <div class="input-wrapper">
                <i class="pi pi-shield input-icon"></i>
                <input
                  type="text"
                  pInputText
                  [(ngModel)]="captchaCode"
                  name="captchaCode"
                  placeholder="Enter code from image"
                  class="input-field"
                  [disabled]="isLoading"
                  autocomplete="off"
                />
              </div>
            </div>
          </div>

          <!-- Sign In Button -->
          <p-button
            [label]="isLoading ? 'Sending email...' : 'Reset'"
            (onClick)="onResetPassword()"
            styleClass="signin-button"
            [disabled]="isLoading"
            [loading]="isLoading"
            icon="pi pi-sign-in"
            iconPos="right"
          ></p-button>

        </form>

        <!-- Footer -->
        <div class="terms-container">
          <div class="security-badge">
            <i class="pi pi-lock"></i>
            <span>PIPEDA Compliant • Your data is secure</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</app-page-layout>
