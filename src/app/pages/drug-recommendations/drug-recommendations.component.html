<app-page-layout>
  <div class="recommendations-container">
    <!-- Loading -->
    <div *ngIf="isLoading" class="loading-container">
      <p-progressSpinner></p-progressSpinner>
    </div>

    <!-- Error -->
    <p-message *ngIf="!isLoading && errorMessage" severity="error" [text]="errorMessage"></p-message>

    <!-- Content based on mock -->
    <div *ngIf="!isLoading && !errorMessage" class="centered">
      <h2 class="title">Recommended dose and brand</h2>

      <div class="product">
        <div class="name">Drug name and branch</div>
        <div class="dose">50mg</div>
        <div class="image" aria-hidden="true"></div>
        <div class="desc-title">Drug description</div>
        <div class="desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit</div>
      </div>

      <div class="quantity">
        <label for="qty">Quantity</label>
        <p-dropdown id="qty" [options]="quantityOptions" [(ngModel)]="selectedQuantity" optionLabel="label"></p-dropdown>
      </div>

      <div class="actions">
        <button pButton type="button" label="Continue" (click)="continueToCheckout()"></button>
      </div>
    </div>
  </div>
</app-page-layout>
