<div class="drug-list-container">
  <!-- Header -->
  <div class="header">
    <button pButton type="button" icon="pi pi-arrow-left" class="back-btn" (click)="onBackClick()" label="Back"></button>
    <h1 class="page-title">{{ categoryName }}</h1>
  </div>

  <!-- Loading State -->
  @if (isLoading) {
    <div class="loading-container">
      <p-progressSpinner></p-progressSpinner>
      <p>Loading drugs...</p>
    </div>
  }

  <!-- Error State -->
  @if (errorMessage && !isLoading) {
    <div class="error-container">
      <i class="pi pi-exclamation-triangle error-icon"></i>
      <p class="error-message">{{ errorMessage }}</p>
      <button pButton type="button" label="Retry" (click)="loadDrugs()"></button>
    </div>
  }

  <!-- Drug Grid -->
  @if (!isLoading && !errorMessage) {
    <div class="drug-grid">
      @for (drug of filteredDrugs; track drug.eid) {
        <div class="drug-item" (click)="onDrugClick(drug)">
          <app-drug-card [drug]="drug"></app-drug-card>
        </div>
      }

      <!-- Empty State -->
      @if (filteredDrugs.length === 0) {
        <div class="empty-state">
          <i class="pi pi-inbox empty-icon"></i>
          <p>No drugs found in this category.</p>
        </div>
      }
    </div>
  }
</div>
